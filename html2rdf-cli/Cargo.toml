[package]
name = "html2rdf-cli"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
publish.workspace = true
readme.workspace = true
repository.workspace = true

[[bin]]
name = "html2rdf"
path = "src/main.rs"

[dependencies]
